spring:
  application:
    name: ecommerce-api

  jpa:
    hibernate:
      ddl-auto: validate  # validate/update/create (НЕ используй create для prod!)
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 10
      "[hibernate.order_inserts]": true
      "[hibernate.order_updates]": true
    show-sql: false

  datasource:
    url: jdbc:postgresql://localhost:5432/ecommerce
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  security:
    user:
      name: ${SECURITY_USER}
      password: ${SECURITY_PASS}
    oauth2:
      resourceserver:
        jwt:
          # JWT конфигурация управляется через JwtDecoder бин в SecurityConfiguration
          # Используем локальную публичную ключевую пару для валидации токенов

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  profiles:
    active: dev

server:
  port: 8080
  servlet:
    context-path: /api/v1

logging:
  level:
    root: INFO
    com.ecommerce: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: info
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

app:
  jwt:
    issuer: http://localhost:8080
    audience: my-shop-api
    expiration: 900000  # 15 minutes in ms
    refresh-expiration: 604800000  # 7 days in ms
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000
    allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
    allowed-headers: "*"
    allow-credentials: true