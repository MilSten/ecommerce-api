name: CI

on:
  push:
    branches:
      - develop
      - master
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      SECURITY_USER: admin
      SECURITY_PASS: admin
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ecommerce_dev
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options:
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.3.1

      - name: Set up JDK 21
        uses: actions/setup-java@v4.8.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4.2.4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys:
            ${{ runner.os }}-maven-

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      - name: Build and test
        run: ./mvnw clean verify